data:
  data_dir: data/mitdb
  fs: 360
  lead_index: 0
  window_before: 128
  window_after: 128
  bandpass_low: 0.5
  bandpass_high: 40.0
  filter_order: 4
encoder:
  kind: delta
  delta_threshold: 0.1
  rate_num_steps: 256
model:
  kind: snn
  hidden: 128
  beta: 0.9
  n_classes: 5
train:
  epochs: 30
  batch_size: 1024      # large batch feeds the GPU (SNN is launch-latency bound)
  lr: 0.003             # scaled up for the larger batch
  seed: 1337
  device: auto          # cuda if available, else cpu
  class_weight: balanced
